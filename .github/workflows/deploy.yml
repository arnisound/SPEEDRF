name: Déploiement GitHub Pages

# Build (npm run build → dist/) puis déploiement sur GitHub Pages,
# à chaque push sur main. Déclenchement manuel possible aussi.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build (catalogue encodé + moteur minifié)
        run: npm run build

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader l'artifact (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
